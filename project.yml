name: KittenTips
options:
  bundleIdPrefix: com.brandoncouloute
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: P42G8J7HZD
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    GENERATE_INFOPLIST_FILE: YES

packages:
  KittenTipsPackage:
    path: KittenTipsPackage

targets:
  KittenTips:
    type: application
    platform: iOS
    sources:
      - KittenTips
    dependencies:
      - package: KittenTipsPackage
        product: KittenTipsFeature
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Kitten Tips"
        PRODUCT_BUNDLE_IDENTIFIER: com.enemiesnature.KittenTips
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: KittenTips/Info.plist
      properties:
        GADApplicationIdentifier: "ca-app-pub-3521886190536845~5300544311"
SKAdNetworkItems:
          - SKAdNetworkIdentifier: "cstr6suwn9.skadnetwork"
